<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1280" viewBox="0 0 960 1280">
<style>
.frame { fill: #fff; }
.shadow { filter: drop-shadow(0 10px 28px rgba(0,0,0,.18)); }
.overlay { fill: url(#grad); mix-blend-mode: multiply; opacity: .22; }
</style>
<defs>
  <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffb36b"/>
    <stop offset="45%" stop-color="#ffd36a"/>
    <stop offset="100%" stop-color="#5ca6ff"/>
  </linearGradient>
  <clipPath id="clip"><rect x="0" y="0" width="960" height="1280" rx="0" ry="0"/></clipPath>
</defs>
<rect class="frame" width="100%" height="100%"/>
<image class="shadow" href="yaedaki.jpg" x="0" y="0" width="960" height="1280" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip)"/>
<rect class="overlay" width="100%" height="100%"/>
</svg>