<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f7; color: #222; }
    main { max-width: 820px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    h1, h2 { line-height: 1.4; }
    .meta { color: #666; font-size: 0.95rem; margin-bottom: 24px; }
    ul { padding-left: 1.2rem; }
    footer { margin-top: 40px; color: #777; font-size: 0.9rem; }
    .draft { display: inline-block; padding: 4px 10px; background: #fff3cd; border-radius: 999px; font-size: 0.85rem; margin-left: 8px; }
  </style>
</head>
<body>
  <main>
    {{content}}
    <footer>Generated by TRACE trip-blog workflow.</footer>
  </main>
</body>
</html>
